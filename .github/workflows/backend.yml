name: RaktaSetu Backend CI

on:
  push:
    branches:
      - main
      - dev/person2-backend
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches:
      - main
      - dev/person2-backend
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raktasetu_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libgomp1 cmake

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest Suite
        run: |
          cd backend
          python -m pytest tests/ -v --cov=. --cov-report=xml
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/raktasetu_test
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/raktasetu_test
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
          APP_SECRET_KEY: testsecretkeyvalue1234567890abcdef
