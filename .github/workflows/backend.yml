name: RaktaSetu Backend CI/CD

on:
  push:
    branches:
      - main
      - dev/person2-backend
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches:
      - main
      - dev/person2-backend
    paths:
      - 'backend/**'

env:
  ECR_REPOSITORY: raktasetu-noor
  AWS_REGION: us-east-1

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raktasetu_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libgomp1 cmake

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run Pytest Suite
        run: |
          cd backend
          python -m pytest tests/ -v --cov=. --cov-report=xml
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/raktasetu_test
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/raktasetu_test
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
          APP_SECRET_KEY: testsecretkeyvalue1234567890abcdef

  deploy:
    name: Build & Deploy to AWS App Runner
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on direct push to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION \
            --image-scanning-configuration scanOnPush=true

      - name: Build, Tag, and Push Docker Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update App Runner Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services --region $AWS_REGION \
            --query "ServiceSummaryList[?ServiceName=='raktasetu-noor'].ServiceArn" \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$SERVICE_ARN" ]; then
            echo "App Runner service not found. Create it manually via AWS console or CLI first."
            echo "Image URI: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
            exit 0
          fi
          
          echo "Triggering deployment for service: $SERVICE_ARN"
          aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --region $AWS_REGION
          echo "Deployment triggered. Monitor at: https://console.aws.amazon.com/apprunner"
