version: 1.0
runtime: python311

build:
  commands:
    pre-build:
      - apt-get update && apt-get install -y gcc g++ python3-dev libpq-dev libgomp1 cmake libstdc++6
    build:
      - pip install --no-cache-dir -r requirements.txt
    post-build: []

run:
  runtime-version: 3.11.9
  command: sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8080"
  network:
    port: 8080
    env: PORT
  env:
    - name: APP_ENV
      value: production
    # ── All secret values are injected via App Runner console / CLI ──────────
    # ── DO NOT add secret values in this file — it is committed to git ───────
    - name: APP_SECRET_KEY
      value: REPLACE_VIA_APPRUNNER_CONSOLE
    - name: DATABASE_URL
      value: REPLACE_VIA_APPRUNNER_CONSOLE
    - name: DATABASE_URL_SYNC
      value: REPLACE_VIA_APPRUNNER_CONSOLE
    - name: REDIS_URL
      value: REPLACE_VIA_APPRUNNER_CONSOLE
    - name: AWS_DEFAULT_REGION
      value: us-east-1
    - name: AWS_REGION
      value: us-east-1
    - name: AWS_COGNITO_USER_POOL_ID
      value: us-east-1_YI3lZZIuK
    - name: AWS_COGNITO_CLIENT_ID
      value: 2k0aad7vm3gd1sbog7e93guhbk
    - name: AWS_DYNAMODB_TABLE_COMPATIBILITY
      value: DonorCompatibilityEdges
    - name: AWS_RDS_HOST
      value: raktasetu-db.covwwscw4pp0.us-east-1.rds.amazonaws.com
    - name: AWS_RDS_PORT
      value: "5432"
    - name: AWS_RDS_DATABASE
      value: raktasetu
    - name: AWS_RDS_USER
      value: raktasetu_admin
    - name: AWS_RDS_PASSWORD
      value: REPLACE_VIA_APPRUNNER_CONSOLE
    - name: TELEGRAM_BOT_TOKEN
      value: REPLACE_VIA_APPRUNNER_CONSOLE
    - name: TELEGRAM_CHAT_ID
      value: "6408745167"
    - name: GEMINI_API_KEY
      value: REPLACE_VIA_APPRUNNER_CONSOLE
    - name: GEMINI_MODEL
      value: gemini-2.5-flash-preview-05-20
    - name: FRONTEND_URL
      value: "*"
    - name: SARVAM_API_KEY
      value: REPLACE_VIA_APPRUNNER_CONSOLE
